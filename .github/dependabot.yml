# Dependabot — automated dependency update PRs.
# Free and works on private repos. Complements the License Check and Secret Scan
# workflows. Enable "Dependabot alerts" in repo Settings → Code security for
# vulnerability notifications (also free) — that is the real security signal.
#
# Policy: take low-risk patch/minor updates (grouped to avoid noise) and ignore
# major bumps, which are breaking and should be done deliberately + tested.
# NOTE: `version-update:semver-major` ignores do NOT block security updates, so
# a security-driven major still comes through.
version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
