# Secret Scan — stops credential leaks.
#
# Scans the full git history on every push and PR for accidentally committed
# WhatsApp / Meta tokens, .env contents, JWT/encryption keys, and database /
# Redis connection strings before they become a permanent leak. Critical given
# ForgeChat handles real messaging credentials.
#
# Note: we run the gitleaks BINARY directly rather than gitleaks/gitleaks-action,
# because that action requires a paid GITLEAKS_LICENSE for organization-owned
# repos. The binary is free.
name: Secret Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0   # full history
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          # Download to the canonical filename so it matches the checksums.txt entry.
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}" -o "${TARBALL}"
          # Verify the download against the published checksum before executing it.
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar -xzf "${TARBALL}" gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
