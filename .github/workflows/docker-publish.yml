# Publish Docker Images — makes one-command deploy real.
#
# On a published release, builds the backend and frontend images and pushes them
# to GitHub's free container registry (GHCR), tagged by the release version.
# Self-hosters then pull pre-built, versioned images instead of building from
# source:
#   ghcr.io/forgemind-git/forgechat-backend:<version>
#   ghcr.io/forgemind-git/forgechat-frontend:<version>
#
# ForgeChat ships two images (Express API + nginx-served React build), so this
# builds both via a matrix. The image name is lowercased by metadata-action.
name: Publish Docker Images

on:
  release:
    types: [published]

jobs:
  docker:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # The backend Dockerfile copies both backend/ and db/migrations/, so it
          # builds from the repo ROOT (matches docker-compose.yml). The frontend
          # is self-contained and builds from ./frontend.
          - name: backend
            context: .
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
